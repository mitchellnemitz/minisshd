name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt would reformat these files:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod tidy (no-op check)
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "::error::go.mod / go.sum drifted; run 'go mod tidy' locally"
            git --no-pager diff -- go.mod go.sum
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go test -short
        run: go test -short ./...

  test-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go test -short -race
        run: go test -short -race ./...

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: ensure system ssh/sftp/scp are present
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openssh-client
          for bin in /usr/bin/ssh /usr/bin/sftp /usr/bin/scp; do
            if [ ! -x "$bin" ]; then
              echo "::error::$bin missing — make e2e would be skipped"
              exit 1
            fi
          done

      - name: make e2e
        run: make e2e
