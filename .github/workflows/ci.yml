# Scope: GHA ci is a Linux sanity check, not a complete spec §13.6 gate.
# Spec §13.6 calls for `make test`, `make test-slow`, `make test-race`,
# `make e2e`, and `make coverage` on both macOS and Linux. We run four of
# those Make targets on ubuntu-latest; `make test-slow` is intentionally
# omitted from CI — its real-time §5 rate-limit timing tests duplicate
# coverage already exercised by `make coverage` (which runs the same
# integration suite without -short) and add ~60s of wall-clock backoff
# waits that contribute no additional assertion signal. Run `make
# test-slow` locally before release if you want to exercise the real-time
# backoff path end-to-end. macOS verification stays the operator's
# responsibility before tagging (PTY, signal, and SFTP semantics still
# diverge across the two OSes, and macOS GHA runners are expensive and
# slow).

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          set -o pipefail
          # gofmt -l . prints reformat candidates on stdout and parse errors on
          # stderr (with exit 2). Capture both so we surface either failure
          # mode; assigning via $(...) would otherwise mask gofmt's non-zero
          # exit because `set -e` does not trigger on assignment.
          if ! out=$(gofmt -l . 2>&1); then
            rc=$?
            echo "::error::gofmt exited $rc"
            echo "$out"
            exit "$rc"
          fi
          if [ -n "$out" ]; then
            echo "::error::gofmt would reformat these files:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod tidy (no-op check)
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "::error::go.mod / go.sum drifted; run 'go mod tidy' locally"
            git --no-pager diff -- go.mod go.sum
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go test -short
        run: go test -short ./...

  test-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go test -short -race
        run: go test -short -race ./...

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: ensure system ssh/sftp/scp are present
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openssh-client
          for bin in /usr/bin/ssh /usr/bin/sftp /usr/bin/scp; do
            if [ ! -x "$bin" ]; then
              echo "::error::$bin missing — make e2e would be skipped"
              exit 1
            fi
          done

      - name: make e2e
        run: make e2e

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: ensure system ssh/sftp/scp are present
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openssh-client
          for bin in /usr/bin/ssh /usr/bin/sftp /usr/bin/scp; do
            if [ ! -x "$bin" ]; then
              echo "::error::$bin missing — make coverage will skip the E2E layer"
              exit 1
            fi
          done

      - name: make coverage
        run: make coverage
